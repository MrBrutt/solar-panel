<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Зависимость мощности солнечной панели от угла наклона</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:1.5rem;}
h1{font-size:1.1rem;font-weight:500;color:#8b949e;text-align:center;margin-bottom:0.25rem;letter-spacing:.03em;text-transform:uppercase;}
h2{font-size:1.6rem;font-weight:600;color:#e6edf3;text-align:center;margin-bottom:1.5rem;}
#scene{width:100%;height:340px;display:block;border-radius:12px;border:1px solid #21262d;background:#06101e;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr);}}
.m{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:.75rem 1rem;}
.ml{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.mv{font-family:'Courier New',monospace;font-size:20px;font-weight:600;color:#e6edf3;}
.mu{font-size:12px;color:#8b949e;}
.bar{height:4px;background:#21262d;border-radius:2px;margin-top:6px;overflow:hidden;}
.bf{height:100%;border-radius:2px;transition:width .1s;}
.srow{display:flex;align-items:center;gap:12px;margin-top:12px;}
.srow label{font-size:13px;color:#8b949e;min-width:50px;}
.srow input[type=range]{flex:1;accent-color:#378ADD;}
.sv{font-family:'Courier New',monospace;font-size:14px;font-weight:600;color:#e6edf3;min-width:36px;text-align:right;}
.chart-title{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px;}
#chartWrap{position:relative;height:180px;}
footer{text-align:center;margin-top:2rem;font-size:12px;color:#484f58;}
</style>
</head>
<body>
<h1>Исследовательская работа · МЭС Иннополис 2026</h1>
<h2>Зависимость мощности солнечной панели от угла наклона</h2>

<canvas id="scene"></canvas>

<div class="metrics">
  <div class="m"><div class="ml">Мощность</div><div><span class="mv" id="mP">11.84</span><span class="mu"> мВт</span></div><div class="bar"><div class="bf" id="bP" style="background:#378ADD;width:100%"></div></div></div>
  <div class="m"><div class="ml">Освещённость</div><div><span class="mv" id="mL">994</span><span class="mu"> лк</span></div><div class="bar"><div class="bf" id="bL" style="background:#1D9E75;width:100%"></div></div></div>
  <div class="m"><div class="ml">cos(θ)</div><div><span class="mv" id="mC">1.000</span></div></div>
  <div class="m"><div class="ml">КПД от макс.</div><div><span class="mv" id="mE">100</span><span class="mu"> %</span></div><div class="bar"><div class="bf" id="bE" style="background:#EF9F27;width:100%"></div></div></div>
</div>

<div class="srow">
  <label>Угол θ</label>
  <input type="range" min="0" max="88" value="0" id="sl" step="1"/>
  <span class="sv" id="sv">0°</span>
</div>

<div class="chart-title">P (мВт) vs угол — экспериментальные данные</div>
<div id="chartWrap"><canvas id="ch"></canvas></div>

<footer>Гаджикулиев Хаджи Умар · 10 класс · Международная гимназия Сколково</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DATA=[
  {a:0.1,c:0.9999,lux:994,p:11.844},
  {a:10.1,c:0.9845,lux:950,p:11.388},
  {a:20,c:0.9397,lux:857,p:10.519},
  {a:30.3,c:0.8634,lux:762,p:9.185},
  {a:40.1,c:0.7649,lux:553,p:7.749},
  {a:50,c:0.6428,lux:397,p:6.346},
  {a:60.2,c:0.4970,lux:260,p:4.588},
  {a:70.1,c:0.3404,lux:109,p:2.869},
  {a:79.7,c:0.1788,lux:25,p:1.397},
  {a:87.9,c:0.0366,lux:14,p:0.415}
];
const maxP=11.844,maxL=994;

function interp(angle){
  if(angle<=DATA[0].a)return{...DATA[0]};
  if(angle>=DATA[DATA.length-1].a)return{...DATA[DATA.length-1]};
  for(let i=0;i<DATA.length-1;i++){
    if(angle>=DATA[i].a&&angle<=DATA[i+1].a){
      const t=(angle-DATA[i].a)/(DATA[i+1].a-DATA[i].a);
      return{a:angle,c:DATA[i].c+t*(DATA[i+1].c-DATA[i].c),lux:DATA[i].lux+t*(DATA[i+1].lux-DATA[i].lux),p:DATA[i].p+t*(DATA[i+1].p-DATA[i].p)};
    }
  }
}

const cv=document.getElementById('scene');
const ctx=cv.getContext('2d');
let W,H;

function resize(){
  W=cv.offsetWidth;H=cv.offsetHeight;
  cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
}
window.addEventListener('resize',()=>{resize();draw(currentAngle);});
resize();

let currentAngle=0,targetAngle=0;

function draw(angleDeg){
  ctx.clearRect(0,0,W,H);
  const rad=angleDeg*Math.PI/180;
  const intensity=Math.cos(rad);

  const sky=ctx.createLinearGradient(0,0,0,H*0.65);
  sky.addColorStop(0,`rgb(${Math.round(6+intensity*14)},${Math.round(10+intensity*20)},${Math.round(30+intensity*60)})`);
  sky.addColorStop(1,`rgb(${Math.round(16+intensity*20)},${Math.round(25+intensity*40)},${Math.round(50+intensity*80)})`);
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*0.65);

  const gnd=ctx.createLinearGradient(0,H*0.65,0,H);
  gnd.addColorStop(0,`rgb(${Math.round(18+intensity*12)},${Math.round(28+intensity*15)},${Math.round(22+intensity*10)})`);
  gnd.addColorStop(1,'#060e0a');
  ctx.fillStyle=gnd;ctx.fillRect(0,H*0.65,W,H*0.35);

  ctx.strokeStyle=`rgba(100,180,120,${0.1+intensity*0.15})`;
  ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(0,H*0.65);ctx.lineTo(W,H*0.65);ctx.stroke();

  const sunX=W*0.12+(1-angleDeg/88)*W*0.1;
  const sunY=H*0.08+(1-intensity)*H*0.25;

  const sg=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,80);
  sg.addColorStop(0,`rgba(255,240,150,${0.25*intensity})`);
  sg.addColorStop(0.3,`rgba(255,200,80,${0.1*intensity})`);
  sg.addColorStop(1,'rgba(255,150,0,0)');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sunX,sunY,80,0,Math.PI*2);ctx.fill();

  if(intensity>0.05){
    ctx.fillStyle=`rgba(255,248,180,${0.9+intensity*0.1})`;
    ctx.beginPath();ctx.arc(sunX,sunY,10+intensity*4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,255,220,${intensity})`;
    ctx.beginPath();ctx.arc(sunX,sunY,6+intensity*2,0,Math.PI*2);ctx.fill();
  }

  const cx2=W*0.56,cy2=H*0.54;
  const pw=130,ph=76;
  const cosT=Math.cos(rad),sinT=Math.sin(rad);

  const iso=(x,y,z)=>({x:cx2+x*0.866-z*0.866,y:cy2-x*0.5+z*0.5-y});
  function panelPt(lx,ly){return iso(lx,ly*cosT,ly*sinT);}

  const tl=panelPt(-pw/2,ph/2),tr=panelPt(pw/2,ph/2);
  const br=panelPt(pw/2,-ph/2),bl=panelPt(-pw/2,-ph/2);

  const shOffset=(1-intensity)*60;
  const shScale=0.3+intensity*0.3;
  const shadow=[tl,tr,br,bl].map(p=>({x:p.x+shOffset*0.8,y:H*0.65+(p.y-H*0.65)*shScale*0.3+shOffset*0.3}));
  ctx.beginPath();ctx.moveTo(shadow[0].x,shadow[0].y);
  for(let i=1;i<4;i++)ctx.lineTo(shadow[i].x,shadow[i].y);
  ctx.closePath();ctx.fillStyle=`rgba(0,0,0,${0.25*intensity})`;
  ctx.filter='blur(8px)';ctx.fill();ctx.filter='none';

  ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();
  ctx.fillStyle='rgb(30,35,40)';ctx.fill();

  const r2=Math.round(20+intensity*30),g2=Math.round(50+intensity*80),b2=Math.round(120+intensity*100);
  const pg=ctx.createLinearGradient(tl.x,tl.y,br.x,br.y);
  pg.addColorStop(0,`rgba(${r2+20},${g2+20},${b2+20},1)`);
  pg.addColorStop(0.5,`rgba(${r2},${g2},${b2},1)`);
  pg.addColorStop(1,`rgba(${Math.round(r2*0.7)},${Math.round(g2*0.7)},${Math.round(b2*0.7)},1)`);
  ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();
  ctx.fillStyle=pg;ctx.fill();

  const cols=6,rows=4;
  for(let rr=0;rr<rows;rr++)for(let cc=0;cc<cols;cc++){
    const u0=(cc+0.05)/cols,u1=(cc+0.95)/cols;
    const v0=(rr+0.05)/rows,v1=(rr+0.95)/rows;
    const lerp=(a,b,t)=>a+(b-a)*t;
    function ptL(u,v){
      const top={x:lerp(tl.x,tr.x,u),y:lerp(tl.y,tr.y,u)};
      const bot={x:lerp(bl.x,br.x,u),y:lerp(bl.y,br.y,u)};
      return{x:lerp(top.x,bot.x,v),y:lerp(top.y,bot.y,v)};
    }
    const p0=ptL(u0,v0),p1=ptL(u1,v0),p2=ptL(u1,v1),p3=ptL(u0,v1);
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.closePath();
    const cd=Math.round(15+intensity*25);
    ctx.fillStyle=`rgba(${cd},${cd+10},${cd+40},0.9)`;ctx.fill();
    ctx.strokeStyle=`rgba(80,120,180,${0.2+intensity*0.2})`;ctx.lineWidth=0.5;ctx.stroke();
  }

  ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();
  ctx.strokeStyle=`rgba(140,160,180,${0.5+intensity*0.3})`;ctx.lineWidth=1.5;ctx.stroke();

  if(intensity>0.2){
    const hlPt=panelPt(-pw*0.2,ph*0.25);
    const hlg=ctx.createRadialGradient(hlPt.x,hlPt.y,0,hlPt.x,hlPt.y,40);
    hlg.addColorStop(0,`rgba(255,255,255,${intensity*0.25})`);
    hlg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.save();
    ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();
    ctx.clip();ctx.beginPath();ctx.arc(hlPt.x,hlPt.y,40,0,Math.PI*2);ctx.fillStyle=hlg;ctx.fill();
    ctx.restore();
  }

  const standBot=iso(0,-5,0),standTop=panelPt(0,0);
  ctx.beginPath();ctx.moveTo(standTop.x,standTop.y);ctx.lineTo(standBot.x,standBot.y);
  ctx.strokeStyle='rgba(120,140,160,0.7)';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(standBot.x,standBot.y,5,0,Math.PI*2);
  ctx.fillStyle='rgba(80,100,120,0.8)';ctx.fill();

  for(let i=0;i<6;i++){
    const t2=i/5;
    const tp=panelPt(-pw*0.4+t2*pw*0.8,ph*0.2-t2*ph*0.4);
    const ra=(0.12+intensity*0.35)*(1-Math.abs(t2-0.5)*0.8);
    const rg=ctx.createLinearGradient(sunX,sunY,tp.x,tp.y);
    rg.addColorStop(0,'rgba(255,240,120,0)');
    rg.addColorStop(0.6,`rgba(255,220,80,${ra*0.5})`);
    rg.addColorStop(1,`rgba(255,200,60,${ra})`);
    ctx.beginPath();ctx.moveTo(sunX,sunY);ctx.lineTo(tp.x,tp.y);
    ctx.strokeStyle=rg;ctx.lineWidth=1+intensity*0.5;ctx.stroke();
  }

  if(angleDeg>2){
    const arcC=panelPt(pw*0.5+5,0);
    ctx.beginPath();ctx.arc(arcC.x,arcC.y+10,22,-Math.PI/2,-Math.PI/2+rad,false);
    ctx.strokeStyle='rgba(255,180,50,0.7)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='rgba(255,180,50,0.9)';ctx.font='bold 12px monospace';
    ctx.fillText(`${angleDeg.toFixed(0)}°`,arcC.x+26,arcC.y+6);
  }

  ctx.save();
  ctx.beginPath();ctx.rect(0,H*0.65,W,H*0.35);ctx.clip();
  for(let i=-8;i<=8;i++){
    const gp1=iso(i*20,-5,-60),gp2=iso(i*20,-5,60);
    const gp3=iso(-160,-5,i*20),gp4=iso(160,-5,i*20);
    ctx.strokeStyle=`rgba(40,80,50,${0.15+intensity*0.1})`;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(gp1.x,gp1.y);ctx.lineTo(gp2.x,gp2.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(gp3.x,gp3.y);ctx.lineTo(gp4.x,gp4.y);ctx.stroke();
  }
  ctx.restore();
}

function updateUI(angle){
  const d=interp(angle);
  document.getElementById('mP').textContent=d.p.toFixed(2);
  document.getElementById('mL').textContent=Math.round(d.lux);
  document.getElementById('mC').textContent=d.c.toFixed(3);
  document.getElementById('mE').textContent=Math.round(d.p/maxP*100);
  document.getElementById('bP').style.width=(d.p/maxP*100).toFixed(1)+'%';
  document.getElementById('bL').style.width=(d.lux/maxL*100).toFixed(1)+'%';
  document.getElementById('bE').style.width=(d.p/maxP*100).toFixed(1)+'%';
  document.getElementById('sv').textContent=angle.toFixed(0)+'°';
  chart.data.datasets[2].data=[{x:angle,y:d.p}];
  chart.update('none');
}

function animate(){
  requestAnimationFrame(animate);
  currentAngle+=(targetAngle-currentAngle)*0.1;
  draw(currentAngle);
}

document.getElementById('sl').addEventListener('input',e=>{
  targetAngle=parseFloat(e.target.value);
  updateUI(targetAngle);
});

const chart=new Chart(document.getElementById('ch'),{
  type:'scatter',
  data:{datasets:[
    {label:'cos модель',data:Array.from({length:90},(_,i)=>({x:i,y:maxP*Math.cos(i*Math.PI/180)})),type:'line',borderColor:'#1D9E75',borderWidth:1.5,pointRadius:0,tension:0.4},
    {label:'данные',data:DATA.map(d=>({x:d.a,y:d.p})),backgroundColor:'#378ADD',pointRadius:5},
    {label:'текущий',data:[{x:0,y:maxP}],backgroundColor:'#D85A30',pointRadius:9,pointStyle:'rectRot'}
  ]},
  options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{min:0,max:90,grid:{color:'rgba(128,128,128,0.1)'},ticks:{color:'#8b949e',font:{size:11}},title:{display:true,text:'Угол (°)',color:'#8b949e',font:{size:11}}},
      y:{min:0,max:13,grid:{color:'rgba(128,128,128,0.1)'},ticks:{color:'#8b949e',font:{size:11}},title:{display:true,text:'мВт',color:'#8b949e',font:{size:11}}}
    }
  }
});

animate();
updateUI(0);
</script>
</body>
</html>
